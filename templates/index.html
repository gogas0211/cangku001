<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>小红书爆款文案生成器</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'PingFang SC','Hiragino Sans GB',Arial,sans-serif;background:#fff5f7;min-height:100vh;padding:24px 12px;}
    .container{max-width:720px;margin:0 auto;}
    h1{font-size:22px;font-weight:700;color:#ff2442;margin-bottom:4px;}
    .subtitle{font-size:13px;color:#999;margin-bottom:24px;}

    .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(255,36,66,0.06);}
    .card-title{font-size:13px;font-weight:600;color:#ff2442;margin-bottom:14px;letter-spacing:0.5px;}

    label{display:block;font-size:13px;color:#666;margin-bottom:4px;margin-top:12px;}
    label:first-of-type{margin-top:0;}
    input,textarea,select{width:100%;padding:10px 12px;border:1px solid #ffe0e6;border-radius:10px;font-size:14px;color:#333;background:#fff;outline:none;transition:border 0.2s;}
    input:focus,textarea:focus,select:focus{border-color:#ff2442;}
    textarea{resize:vertical;min-height:72px;line-height:1.6;}
    input[type="password"]{letter-spacing:2px;}

    .key-row{display:flex;gap:8px;align-items:center;}
    .key-row input{flex:1;}
    .key-toggle{font-size:12px;color:#ff2442;cursor:pointer;white-space:nowrap;padding:10px 0;}

    .style-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
    .style-btn{padding:10px;border:1.5px solid #ffe0e6;border-radius:10px;font-size:13px;color:#666;cursor:pointer;text-align:center;transition:all 0.15s;background:#fff;}
    .style-btn.active{border-color:#ff2442;color:#ff2442;background:#fff5f7;font-weight:600;}

    .generate-btn{width:100%;padding:14px;background:#ff2442;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.15s;margin-top:4px;}
    .generate-btn:hover{opacity:0.9;}
    .generate-btn:disabled{opacity:0.5;cursor:not-allowed;}

    .result-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(255,36,66,0.08);border-left:4px solid #ff2442;display:none;}
    .result-card.show{display:block;}
    .result-label{font-size:12px;color:#ff2442;font-weight:600;margin-bottom:6px;margin-top:14px;}
    .result-label:first-of-type{margin-top:0;}
    .result-content{font-size:14px;color:#333;line-height:1.8;white-space:pre-wrap;}
    .result-title{font-size:17px;font-weight:700;color:#ff2442;line-height:1.5;}
    .hashtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
    .tag{background:#fff5f7;color:#ff2442;font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid #ffe0e6;}

    .copy-btn{margin-top:14px;padding:10px 20px;border:1.5px solid #ff2442;border-radius:10px;color:#ff2442;background:#fff;font-size:13px;cursor:pointer;font-weight:600;}
    .copy-btn:hover{background:#fff5f7;}

    .loading{text-align:center;padding:24px;color:#ff2442;font-size:14px;display:none;}
    .loading.show{display:block;}
    .dot{animation:blink 1.2s infinite;}
    .dot:nth-child(2){animation-delay:0.2s;}
    .dot:nth-child(3){animation-delay:0.4s;}
    @keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}

    .error{background:#fff0f0;border:1px solid #ffb3b3;border-radius:10px;padding:12px;color:#cc0000;font-size:13px;margin-top:12px;display:none;}
    .error.show{display:block;}

    .tip{background:#fff5f7;border-radius:10px;padding:10px 12px;font-size:12px;color:#999;line-height:1.6;margin-top:8px;}
  </style>
</head>
<body>
<div class="container">
  <h1>🌸 小红书爆款文案生成器</h1>
  <p class="subtitle">Gemini 驱动 · 种草测评 · 生活方式</p>

  <div class="card">
    <div class="card-title">🔑 API 设置</div>
    <label>Anthropic API Key</label>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="AIzaSy..." />
      <span class="key-toggle" onclick="toggleKey()">显示</span>
    </div>
    <div class="tip">Key 仅保存在你的浏览器本地，不会上传到任何服务器。免费额度每天可用。</div>
  </div>

  <div class="card">
    <div class="card-title">✏️ 内容设置</div>

    <label>内容类型</label>
    <div class="style-grid">
      <div class="style-btn active" onclick="selectType(this,'种草测评')">🛍️ 种草测评</div>
      <div class="style-btn" onclick="selectType(this,'生活方式')">✨ 生活方式</div>
      <div class="style-btn" onclick="selectType(this,'经验分享')">💡 经验分享</div>
      <div class="style-btn" onclick="selectType(this,'好物推荐')">⭐ 好物推荐</div>
    </div>

    <label>主题 / 产品</label>
    <input type="text" id="topic" placeholder="例如：韩国护肤品 COSRX 蜗牛霜" />

    <label>目标受众</label>
    <input type="text" id="audience" placeholder="例如：25-35岁爱护肤的女生" />

    <label>核心卖点 / 想传达的感受</label>
    <textarea id="objective" placeholder="例如：亲测有效、平价好用、敏感肌也能用、半个月皮肤变好了"></textarea>

    <label>关键词（逗号分隔）</label>
    <input type="text" id="keywords" placeholder="例如：平价好物,护肤,敏感肌,素颜" />

    <label>文案风格</label>
    <select id="tone">
      <option value="真实闺蜜分享">真实闺蜜分享（最受欢迎）</option>
      <option value="专业测评">专业测评风</option>
      <option value="搞笑自嘲">搞笑自嘲风</option>
      <option value="精致生活">精致生活风</option>
      <option value="素人逆袭">素人逆袭风</option>
    </select>
  </div>

  <div class="card">
    <div class="card-title">🚀 生成选项</div>
    <div class="style-grid">
      <button class="generate-btn" onclick="generate(1)" id="btn1">生成 1 篇</button>
      <button class="generate-btn" style="background:#ff6b81;" onclick="generate(3)" id="btn3">生成 3 篇对比</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <p>AI 正在创作爆款文案<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
    <p style="font-size:12px;color:#ccc;margin-top:6px;">通常需要 10~20 秒</p>
  </div>

  <div class="error" id="error"></div>
  <div id="results"></div>
</div>

<script>
let selectedType = '种草测评';

function selectType(el, type) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = type;
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  const btn = event.target;
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '隐藏'; }
  else { inp.type = 'password'; btn.textContent = '显示'; }
}

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) localStorage.setItem('xhs_api_key', k);
}

window.onload = () => {
  const saved = localStorage.getItem('xhs_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
};

function buildPrompt(count) {
  const topic = document.getElementById('topic').value.trim();
  const audience = document.getElementById('audience').value.trim();
  const objective = document.getElementById('objective').value.trim();
  const keywords = document.getElementById('keywords').value.trim();
  const tone = document.getElementById('tone').value;

  return `你是一位拥有百万粉丝的小红书爆款博主，擅长写让人忍不住点赞收藏的文案。

请根据以下信息，生成${count}篇高质量小红书爆款文案：

内容类型：${selectedType}
主题/产品：${topic}
目标受众：${audience}
核心卖点：${objective}
关键词：${keywords}
文案风格：${tone}

爆款标题要求（必须符合以下其中一种公式）：
- 痛点型："我熬了3个月才发现，${topic}这样用才对！"
- 好奇型："为什么很多人用了${topic}之后再也不想换？"
- 对比型："花了XXX买了很多，最后只留下了${topic}"
- 数字型："用了30天，${topic}让我皮肤变化超明显"
- 反转型："劝你别买${topic}！除非你也想..."

正文要求：
- 开头必须有钩子（共鸣/痛点/好奇心）
- 用真实体验感的语气，像在跟闺蜜聊天
- 有具体细节和使用感受，不能太泛
- 自然融入关键词，不生硬
- 结尾要有互动引导（问问题或让人评论）
- 适当使用emoji让内容更生动
- 字数在300-500字之间

话题标签：给出8-10个精准标签，混合大标签和小标签

请用以下JSON格式返回，不要有任何多余文字：
${count === 1 ? `{
  "posts": [
    {
      "title": "标题",
      "opening": "开头钩子（1-2句）",
      "body": "正文内容",
      "cta": "互动引导结尾",
      "hashtags": ["标签1", "标签2"]
    }
  ]
}` : `{
  "posts": [
    {"title": "版本1标题", "opening": "开头", "body": "正文", "cta": "结尾", "hashtags": ["标签"]},
    {"title": "版本2标题", "opening": "开头", "body": "正文", "cta": "结尾", "hashtags": ["标签"]},
    {"title": "版本3标题", "opening": "开头", "body": "正文", "cta": "结尾", "hashtags": ["标签"]}
  ]
}`}`;
}

async function generate(count) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('请先填写 API Key'); return; }
  if (!document.getElementById('topic').value.trim()) { showError('请填写主题/产品'); return; }
  if (!document.getElementById('audience').value.trim()) { showError('请填写目标受众'); return; }
  if (!document.getElementById('objective').value.trim()) { showError('请填写核心卖点'); return; }

  saveKey();
  setLoading(true);
  document.getElementById('error').classList.remove('show');
  document.getElementById('results').innerHTML = '';

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: buildPrompt(count) }] }],
        generationConfig: { maxOutputTokens: 2000, temperature: 0.9 }
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || `请求失败 ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    renderResults(parsed.posts);
  } catch(e) {
    showError('生成失败：' + e.message);
  } finally {
    setLoading(false);
  }
}

function renderResults(posts) {
  const box = document.getElementById('results');
  box.innerHTML = '';
  posts.forEach((post, i) => {
    const card = document.createElement('div');
    card.className = 'result-card show';
    const tags = post.hashtags.map(t => `<span class="tag">${t.startsWith('#') ? t : '#'+t}</span>`).join('');
    const full = `${post.title}\n\n${post.opening}\n\n${post.body}\n\n${post.cta}\n\n${post.hashtags.map(t=>t.startsWith('#')?t:'#'+t).join(' ')}`;
    card.innerHTML = `
      ${posts.length > 1 ? `<div style="font-size:12px;color:#ff2442;font-weight:600;margin-bottom:10px;">版本 ${i+1}</div>` : ''}
      <div class="result-label">📌 标题</div>
      <div class="result-title">${esc(post.title)}</div>
      <div class="result-label">🎯 开头钩子</div>
      <div class="result-content">${esc(post.opening)}</div>
      <div class="result-label">📝 正文</div>
      <div class="result-content">${esc(post.body)}</div>
      <div class="result-label">💬 互动引导</div>
      <div class="result-content">${esc(post.cta)}</div>
      <div class="result-label">🏷️ 话题标签</div>
      <div class="hashtags">${tags}</div>
      <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(full)})">📋 一键复制全文</button>
    `;
    box.appendChild(card);
  });
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 已复制！';
    setTimeout(() => btn.textContent = '📋 一键复制全文', 2000);
  });
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
  document.getElementById('btn1').disabled = on;
  document.getElementById('btn3').disabled = on;
}
</script>
</body>
</html>
